# Статическая конфигурация Traefik
# Этот файл загружается ОДИН РАЗ при старте Traefik.
# Изменения требуют перезапуска контейнера.
# Расположение внутри контейнера: /etc/traefik/traefik.yml

global:
  # Отключаем проверку новых версий (не нужно в учебных целях)
  checkNewVersion: false
  # Отключаем отправку анонимной статистики в Traefik
  sendAnonymousUsage: false

log:
  # Уровень логирования: DEBUG показывает всё, включая обработку каждого запроса
  # Другие варианты: INFO, WARNING, ERROR
  level: DEBUG
  # Формат логов: common (читаемый) или json (для систем сбора логов)
  format: common

# EntryPoints — это "двери", через которые запросы попадают в Traefik
entryPoints:
  # Имя "web" произвольное, но принято использовать именно его для HTTP
  web:
    address: ":80"   # Traefik будет слушать все интерфейсы на порту 80

# Providers — источники динамической конфигурации
# (роутеры, сервисы, middleware описываются в отдельных файлах)
providers:
  file:
    # Путь к папке с динамическими конфигами ВНУТРИ контейнера
    directory: /etc/traefik/fileprovider
    # watch: true означает, что Traefik автоматически перечитает конфиги
    # при изменении файлов — без перезапуска!
    watch: true