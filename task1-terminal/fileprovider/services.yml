# Динамическая конфигурация — описываем роутеры и сервисы
# Этот файл перечитывается Traefik автоматически при изменении (watch: true).
# ВАЖНО: замените NGINX_CONTAINER_IP на реальный IP вашего nginx-контейнера!
# Узнать IP: docker inspect nginx-backend | grep IPAddress

http:
  # ── РОУТЕРЫ ──────────────────────────────────────────────────────────────
  # Роутер — это правило: "если запрос выглядит так → отправь туда"
  routers:
    nginx-router:
      # Правило: запросы на хост "localhost" отправляем к nginx
      # Host() — самый распространённый фильтр
      rule: "Host(`localhost`)"
      # Указываем, на каком EntryPoint слушаем (имя из traefik.yml)
      entryPoints:
        - web
      # Имя сервиса, которому передаём запрос (описан ниже)
      service: nginx-service

  # ── СЕРВИСЫ ──────────────────────────────────────────────────────────────
  # Сервис — это описание реального бэкенда (куда именно слать запрос)
  services:
    nginx-service:
      loadBalancer:
        # Список серверов-бэкендов
        # В реальном проекте их может быть несколько (балансировка нагрузки)
        servers:
            # ВОТ ЗДЕСЬ замените NGINX_CONTAINER_IP на реальный IP!
            # Пример: - url: "http://172.17.0.2:80"
          - url: "http://172.17.0.2:80"
        # passHostHeader: передавать ли оригинальный заголовок Host
        passHostHeader: true